name: Build Fishing Bot EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: 

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodlari Depodan Cek
      uses: actions/checkout@v4

    - name: Python 3.10 Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kutuphaneleri Yukle
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy mss keyboard colorama PyQt5 pyinstaller

    - name: PyInstaller ile EXE Derle
      run: |
        pyinstaller --onefile --console --name="FishingSystem" --clean main.py

    - name: Cikti Klasorunu Hazirla (Templates ile Birlikte)
      shell: cmd  # PowerShell yerine klasik CMD kullanarak hatayı çözüyoruz
      run: |
        mkdir build_output
        xcopy dist\FishingSystem.exe build_output\ /Y
        if exist templates (xcopy templates build_output\templates\ /E /I /Y)

    - name: Hazir Paketi GitHub'a Yukle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: FishingBot-Windows-EXE
        path: build_output/
        
