name: Balık Botu EXE Derle

# Bu dosyayı repo içinde .github/workflows/build.yml olarak kaydet.
# Script dosyasının repo kökünde "balik_botu.py" adıyla bulunduğunu varsayar.

on:
  push:
    branches: [ "main" ]
    paths:
      - "balik_botu.py"
      - ".github/workflows/build.yml"
  workflow_dispatch: {}   # Actions sekmesinden elle de tetiklenebilir

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Kodu indir
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Bağımlılıkları yükle
        run: |
          python -m pip install --upgrade pip
          pip install mss numpy pyautogui keyboard pyinstaller

      - name: EXE'yi derle
        run: |
          pyinstaller --onefile --noconsole --name BalikBotu balik_botu.py

      - name: EXE'yi artifact olarak yükle
        uses: actions/upload-artifact@v4
        with:
          name: BalikBotu-exe
          path: dist/BalikBotu.exe
