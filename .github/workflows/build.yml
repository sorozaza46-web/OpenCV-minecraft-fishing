name: Build Fishing Bot EXE

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Manuel olarak da tetikleyebilmek için

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Kodları Depodan Çek
      uses: actions/checkout@v4

    - name: Python 3.10 Kur
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Gerekli Kütüphaneleri Yükle
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy mss keyboard colorama pyinstaller

    - name: PyInstaller ile EXE Derle
      run: |
        pyinstaller --onefile --console --name="FishingSystem" --clean main.py

    - name: Çıktı Klasörünü Hazırla (Templates ile Birlikte)
      run: |
        mkdir build_output
        xcopy dist\FishingSystem.exe build_output\ /Y
        xcopy templates build_output\templates\ /E /I /Y

    - name: EXE ve Dosyaları GitHub'a Yükle (Artifact)
      uses: actions/upload-artifact@v4
      with:
        name: FishingBot-Windows-EXE
        path: build_output/
        
